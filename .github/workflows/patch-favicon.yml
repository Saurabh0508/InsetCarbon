name: Patch Favicon
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Replace favicon only
        run: |
          python3 - << 'PYEOF'
          import re, glob, base64
          svg = '<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><g fill="#000000"><path d="M 95 40 L 45 72 Q 35 78 35 90 L 35 166 Q 35 178 45 184 L 95 216 Q 107 224 120 216 L 145 200 Q 153 194 153 184 L 153 182 Q 153 170 141 170 Q 135 170 129 174 L 104 190 L 65 166 L 65 90 L 104 66 L 129 82 Q 135 86 141 86 Q 153 86 153 74 L 153 72 Q 153 62 145 56 L 120 40 Q 107 32 95 40 Z"/><circle cx="180" cy="92" r="16"/><circle cx="170" cy="128" r="22"/><circle cx="180" cy="164" r="16"/></g></svg>'
          b64 = base64.b64encode(svg.encode()).decode()
          new_favicon = '<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,' + b64 + '">'
          candidates = glob.glob("*.html") + glob.glob("**/*.html", recursive=True)
          html_file = None
          for f in candidates:
              if "insetcarbon" in f.lower() or "preview" in f.lower() or "index" in f.lower():
                  html_file = f
                  break
          if not html_file and candidates:
              html_file = candidates[0]
          print("Patching favicon in:", html_file)
          with open(html_file, "r") as f:
              html = f.read()
          html = re.sub(r'<link rel="icon"[^>]*>', new_favicon, html)
          with open(html_file, "w") as f:
              f.write(html)
          print("Done")
          PYEOF
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix: restore SVG favicon"
          git push
