name: Patch HTML - Web3Forms
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Write updated JS interceptor
        run: |
          cat > /tmp/w3f_snippet.html << 'HTMLEOF'
          <script id="web3forms-interceptor">
          (function(){
          var KEY="72c76e43-c41e-44bc-9a7f-25e3fd7256d2";
          var _stored={n:"",c:"",r:"",e:""};
          function captureFields(){
          var n=document.getElementById("input-name")||document.querySelector('[placeholder="your name"]');
          var c=document.getElementById("input-company")||document.querySelector('[placeholder="company"]');
          var r=document.getElementById("input-role")||document.querySelector('[placeholder="your role"]');
          var em=document.getElementById("input-email")||document.querySelector('[placeholder="email address"]')||document.querySelector('[type="email"]');
          if(n&&n.value)_stored.n=n.value;
          if(c&&c.value)_stored.c=c.value;
          if(r&&r.value)_stored.r=r.value;
          if(em&&em.value)_stored.e=em.value;
          }
          function sendToWeb3Forms(){
          if(!_stored.n||!_stored.e)return;
          fetch("https://api.web3forms.com/submit",{
          method:"POST",
          headers:{"Content-Type":"application/json","Accept":"application/json"},
          body:JSON.stringify({access_key:KEY,name:_stored.n,company:_stored.c,role:_stored.r,email:_stored.e,subject:"New InsetCarbon Contact: "+_stored.n,from_name:"InsetCarbon Contact Form"})
          }).then(function(res){return res.json();})
          .then(function(d){console.log("Web3Forms:",d.success?"sent":"error",d);})
          .catch(function(e){console.error("Web3Forms error:",e);});
          _stored={n:"",c:"",r:"",e:""};
          }
          function watchInputs(){
          ["input-name","input-company","input-role","input-email"].forEach(function(id){
          var el=document.getElementById(id);
          if(el&&!el._w3f_listener){
          el._w3f_listener=true;
          el.addEventListener("input",captureFields);
          el.addEventListener("change",captureFields);
          }
          });
          var placeholders=["your name","company","your role","email address"];
          placeholders.forEach(function(p){
          var el=document.querySelector('[placeholder="'+p+'"]');
          if(el&&!el._w3f_listener){
          el._w3f_listener=true;
          el.addEventListener("input",captureFields);
          el.addEventListener("change",captureFields);
          }
          });
          }
          function init(){
          watchInputs();
          var observer=new MutationObserver(function(mutations){
          mutations.forEach(function(m){
          m.addedNodes.forEach(function(node){
          if(node.nodeType===1){
          var text=node.textContent||"";
          if(text.indexOf("Message sent")>-1||text.indexOf("Thank you")>-1||text.indexOf("sent")>-1){
          sendToWeb3Forms();
          }
          }
          });
          if(m.type==="characterData"&&m.target){
          var text=m.target.textContent||"";
          if(text.indexOf("Message sent")>-1||text.indexOf("Thank you")>-1){
          sendToWeb3Forms();
          }
          }
          });
          });
          var btn=null;
          var pollBtn=setInterval(function(){
          document.querySelectorAll("button").forEach(function(b){
          if(b.textContent.indexOf("SEND")>-1)btn=b;
          });
          if(btn&&!btn._w3f_btn){
          btn._w3f_btn=true;
          btn.addEventListener("click",function(){
          captureFields();
          },true);
          clearInterval(pollBtn);
          }
          },300);
          observer.observe(document.body,{childList:true,subtree:true,characterData:true});
          var inputPoll=setInterval(function(){
          watchInputs();
          var inputs=document.querySelectorAll('[id^="input-"],[placeholder]');
          if(inputs.length>0)clearInterval(inputPoll);
          },500);
          }
          if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init);}else{init();}
          })();
          </script>
          HTMLEOF
          python3 - << 'PYEOF'
          import re, glob
          candidates = glob.glob("*.html") + glob.glob("**/*.html", recursive=True)
          html_file = None
          for f in candidates:
              if "index" in f.lower() or "insetcarbon" in f.lower() or "preview" in f.lower():
                  html_file = f
                  break
          if not html_file and candidates:
              html_file = candidates[0]
          print("Patching:", html_file)
          with open(html_file, "r") as f:
              html = f.read()
          with open("/tmp/w3f_snippet.html", "r") as f:
              snippet = f.read().strip()
          html = re.sub(r'<script id="web3forms-interceptor">[\s\S]*?</script>', '', html)
          html = html.replace("</body>", snippet + "\n</body>")
          with open(html_file, "w") as f:
              f.write(html)
          print("Done")
          PYEOF
      - name: Commit patched HTML
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix: MutationObserver approach to capture React form success and send to Web3Forms"
          git push
