name: Patch HTML - Web3Forms
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Show context around input-name
        run: |
          python3 << 'PYEOF'
          with open('insetcarbon-preview_github.html', 'r', encoding='utf-8') as f:
              content = f.read()
          pos = content.find('input-name')
          print(f'Context around input-name (pos {pos}):')
          print(repr(content[max(0,pos-200):pos+300]))
          PYEOF
      - name: Commit changes
        run: echo 'No changes in this debug run'
