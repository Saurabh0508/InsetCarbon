name: Patch HTML
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Apply all patches via Python
        run: |
          python3 - << 'PYEOF'
          import re
          with open('insetcarbon-preview_github.html', 'r', encoding='utf-8') as f:
            content = f.read()
          original = content
          # 1. Fix copyright year
          content = content.replace('2025 InsetCarbon', '2026 InsetCarbon')
          content = content.replace('\u00a9 2025', '\u00a9 2026')
          content = content.replace('&copy; 2025', '&copy; 2026')
          content = re.sub(r'(copyright[\s\S]{1,20}?)(2025)', r'\g<1>2026', content, flags=re.IGNORECASE)
          # 2. FORCE-replace favicon
          content = re.sub(r'<link[^>]*rel=["\']icon["\'][^>]*/?>\s*', '', content)
          content = re.sub(r'<link[^>]*rel=["\']shortcut icon["\'][^>]*/?>\s*', '', content)
          favicon_svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="4" fill="#1B3022"/><text x="16" y="24" font-size="22" font-weight="900" font-family="Arial,sans-serif" text-anchor="middle" fill="#C8A96E">C</text></svg>'
          import urllib.parse
          encoded = urllib.parse.quote(favicon_svg, safe='')
          favicon_tag = '<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,' + encoded + '">'
          content = content.replace('</title>', '</title>\n    ' + favicon_tag, 1)
          # 3. Add Vercel Analytics
          if '/_vercel/insights/script.js' not in content:
            content = content.replace('</head>', '<script defer src="/_vercel/insights/script.js"></script>\n</head>', 1)
          # 4. Add Formspree to contact form
          if 'formspree.io' not in content:
            content = re.sub(
              r'(<form[^>]*>)',
              lambda m: '<form action="https://formspree.io/f/xpwzgqdn" method="POST">' if ('contact' in m.group(1).lower() or 'email' in m.group(1).lower()) else m.group(0),
              content
            )
            if 'formspree.io' not in content:
              content = re.sub(r'(<form)(\s)', r'<form action="https://formspree.io/f/xpwzgqdn" method="POST"\2', content, count=1)
          with open('insetcarbon-preview_github.html', 'w', encoding='utf-8') as f:
            f.write(content)
          print('Done. Changes applied.')
          PYEOF
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add insetcarbon-preview_github.html
          git diff --cached --quiet || git commit -m "Patch: favicon, copyright 2026, analytics, formspree"
          git push
