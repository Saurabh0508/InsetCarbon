name: Restore and Patch HTML
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore original HTML and update favicon
        run: |
          python3 << 'PYEOF'
          import re, urllib.parse, subprocess

          # Step 1: Restore original file from commit 8d7ecfb
          result = subprocess.run(
            ['git', 'show', '8d7ecfb:insetcarbon-preview_github.html'],
            capture_output=True, text=True
          )
          if result.returncode != 0:
            print('ERROR: Could not restore original file')
            print(result.stderr)
            exit(1)
          content = result.stdout
          print(f'Restored original file: {len(content)} bytes')

          # Step 2: Replace favicon with new SVG
          favicon_svg = ('<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">'
            '<g fill="#000000">'
            '<path d="M 95 40 L 45 72 Q 35 78 35 90 L 35 166 Q 35 178 45 184 L 95 216'
            ' Q 107 224 120 216 L 145 200 Q 153 194 153 184 L 153 182 Q 153 170 141 170'
            ' Q 135 170 129 174 L 104 190 L 65 166 L 65 90 L 104 66 L 129 82'
            ' Q 135 86 141 86 Q 153 86 153 74 L 153 72 Q 153 62 145 56 L 120 40'
            ' Q 107 32 95 40 Z"/>'
            '<circle cx="180" cy="92" r="16"/>'
            '<circle cx="170" cy="128" r="22"/>'
            '<circle cx="180" cy="164" r="16"/>'
            '</g></svg>')
          encoded = urllib.parse.quote(favicon_svg, safe='')
          new_favicon = '<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,' + encoded + '">'

          # Remove existing favicon link tags
          content = re.sub(r'<link[^>]*rel=["\'](?:shortcut )?icon["\'][^>]*/?>\s*', '', content)
          content = re.sub(r'<link[^>]*type=["\']image/svg\+xml["\'][^>]*/?>\s*', '', content)

          # Inject new favicon after <head>
          content = content.replace('<head>', '<head>\n' + new_favicon, 1)

          with open('insetcarbon-preview_github.html', 'w', encoding='utf-8') as f:
            f.write(content)
          print('Favicon updated successfully')
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add insetcarbon-preview_github.html
          git commit -m "Restore original HTML + update favicon to new hexagonal C design"
          git push
