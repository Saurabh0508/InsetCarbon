name: Patch HTML

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Apply all patches via Python
        run: |
          python3 << 'PYEOF'
          import re

          with open('insetcarbon-preview_github.html', 'r', encoding='utf-8') as f:
              content = f.read()

          original = content

          # 1. Fix copyright year
          content = content.replace('2025 InsetCarbon', '2026 InsetCarbon')
          content = content.replace('\u00a9 2025', '\u00a9 2026')
          content = content.replace('&copy; 2025', '&copy; 2026')
          content = re.sub(r'(copyright[^2]*)(2025)', r'\g<1>2026', content, flags=re.IGNORECASE)

          # 2. Add favicon - insert after <title>...</title>
          favicon = '<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><rect width=\'100\' height=\'100\' rx=\'12\' fill=\'%231B3022\'/><text x=\'50\' y=\'72\' font-size=\'75\' font-weight=\'bold\' font-family=\'Georgia,serif\' text-anchor=\'middle\' fill=\'%23C8A96E\'>C</text></svg>">'
          if '<link rel="icon"' not in content and '<link rel=\'icon\'' not in content:
              content = re.sub(r'(</title>)', r'\1\n    ' + favicon, content, count=1)

          # 3. Add Vercel Analytics
          analytics = '<script defer src="/_vercel/insights/script.js"></script>'
          if '/_vercel/insights/script.js' not in content:
              content = content.replace('</head>', analytics + '\n</head>', 1)

          # 4. Add Formspree to contact form - look for form tags
          # Only patch if not already patched
          if 'formspree.io' not in content:
              content = re.sub(
                  r'<form([^>]*?)>',
                  lambda m: '<form action="https://formspree.io/f/xpwzgqdn" method="POST"' + m.group(1) + '>' if ('contact' in m.group(1).lower() or 'email' in m.group(1).lower()) else m.group(0),
                  content
              )

          if content != original:
              with open('insetcarbon-preview_github.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print('Patches applied successfully')
          else:
              print('No changes needed')
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add insetcarbon-preview_github.html
          git diff --cached --quiet || git commit -m "Patch v2: favicon, copyright 2026, analytics"
          git push
