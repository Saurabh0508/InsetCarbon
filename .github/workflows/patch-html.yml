name: Patch HTML - Web3Forms
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Inject Web3Forms JS interceptor
        run: |
          python3 << 'PYEOF'
          with open('insetcarbon-preview_github.html', 'r', encoding='utf-8') as f:
              content = f.read()
          print(f'File size: {len(content)} bytes')
          if 'web3forms-interceptor' in content:
              print('Web3Forms interceptor already present')
          else:
              w3f_key = '72c76e43-c41e-44bc-9a7f-25e3fd7256d2'
              js_snippet = '''
          <script id="web3forms-interceptor">
          (function() {
            function waitForSendButton() {
              var checkInterval = setInterval(function() {
                var sendBtn = document.querySelector('button[type="submit"]');
                if (!sendBtn) {
                  var buttons = document.querySelectorAll('button');
                  for (var i = 0; i < buttons.length; i++) {
                    if (buttons[i].textContent.indexOf('SEND') !== -1) {
                      sendBtn = buttons[i];
                      break;
                    }
                  }
                }
                if (sendBtn && !sendBtn._w3f_patched) {
                  sendBtn._w3f_patched = true;
                  clearInterval(checkInterval);
                  sendBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var nameEl = document.getElementById('input-name') || document.querySelector('[placeholder="your name"]');
                    var companyEl = document.getElementById('input-company') || document.querySelector('[placeholder="company"]');
                    var roleEl = document.getElementById('input-role') || document.querySelector('[placeholder="your role"]');
                    var emailEl = document.getElementById('input-email') || document.querySelector('[placeholder="email address"]') || document.querySelector('[type="email"]');
                    var name = nameEl ? nameEl.value : '';
                    var company = companyEl ? companyEl.value : '';
                    var role = roleEl ? roleEl.value : '';
                    var email = emailEl ? emailEl.value : '';
                    if (!name || !email) {
                      alert('Please fill in at least your name and email.');
                      return;
                    }
                    var data = {
                      access_key: "''' + w3f_key + '''",
                      subject: "New InsetCarbon Contact Form Submission",
                      name: name,
                      email: email,
                      message: "Name: " + name + "\\nCompany: " + company + "\\nRole: " + role + "\\nEmail: " + email
                    };
                    sendBtn.disabled = true;
                    sendBtn.textContent = 'SENDING...';
                    fetch('https://api.web3forms.com/submit', {
                      method: 'POST',
                      headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
                      body: JSON.stringify(data)
                    }).then(function(r) { return r.json(); }).then(function(res) {
                      if (res.success) {
                        sendBtn.textContent = 'SENT! Thank you.';
                        if (nameEl) nameEl.value = '';
                        if (companyEl) companyEl.value = '';
                        if (roleEl) roleEl.value = '';
                        if (emailEl) emailEl.value = '';
                      } else {
                        sendBtn.textContent = 'ERROR - Try again';
                        sendBtn.disabled = false;
                      }
                    }).catch(function() {
                      sendBtn.textContent = 'ERROR - Try again';
                      sendBtn.disabled = false;
                    });
                  }, true);
                  console.log('Web3Forms interceptor attached to SEND button');
                }
              }, 500);
              setTimeout(function() { clearInterval(checkInterval); }, 10000);
            }
            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', waitForSendButton);
            } else {
              waitForSendButton();
            }
          })();
          </script>'''
              if '</body>' in content:
                  content = content.replace('</body>', js_snippet + '\n</body>', 1)
                  print('Injected Web3Forms JS interceptor before </body>')
              else:
                  content = content + js_snippet
                  print('Appended Web3Forms JS interceptor to end of file')
              with open('insetcarbon-preview_github.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print('Done')
          PYEOF
      - name: Commit changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add insetcarbon-preview_github.html
          git diff --staged --quiet || git commit -m "Feat: Web3Forms JS interceptor for contact form"
          git push
