name: Patch HTML
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Apply all patches via Python
        run: |
          python3 - << 'PYEOF'
          import re
          with open('insetcarbon-preview_github.html', 'r', encoding='utf-8') as f:
            content = f.read()
          # 1. Fix copyright year
          content = content.replace('2025 InsetCarbon', '2026 InsetCarbon')
          content = content.replace('\u00a9 2025', '\u00a9 2026')
          content = content.replace('&copy; 2025', '&copy; 2026')
          content = re.sub(r'(copyright[\s\S]{1,20}?)(2025)', r'\g<1>2026', content, flags=re.IGNORECASE)
          # 2. FORCE-replace favicon with hexagonal C + carbon dots
          favicon_svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="%231B3022" stroke="%238C6A56" stroke-width="1.5"/><text x="16" y="22" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" fill="%23F9F8F3" text-anchor="middle">C</text><circle cx="8" cy="16" r="1.5" fill="%238C6A56"/><circle cx="24" cy="16" r="1.5" fill="%238C6A56"/></svg>'
          import urllib.parse
          encoded = urllib.parse.quote(favicon_svg, safe='%')
          content = re.sub(r'<link[^>]*rel=["\'](?:shortcut )?icon["\'][^>]*>', '', content)
          content = re.sub(r'<link[^>]*href=["\'][^"\']*(favicon|icon)[^"\']*.png["\'][^>]*>', '', content)
          content = content.replace('</head>', f'<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,{encoded}">\n</head>', 1)
          # 3. Remove old Formspree CDN scripts
          content = re.sub(r'<script[^>]*unpkg\.com/@formspree[^>]*>[\s\S]*?</script>\s*', '', content)
          content = re.sub(r'<script[^>]*unpkg\.com/(@formspree|@gformspree)[^>]*></script>\s*', '', content)
          content = re.sub(r'<script>\s*window\.formspree[\s\S]*?</script>\s*', '', content)
          content = re.sub(r'<script>\s*\(function\(\)\){var f=document[\s\S]*?</script>\s*', '', content)
          # 4. Add name attributes to existing inputs if missing
          content = re.sub(r'(id="input-name")', r'\1 name="name"', content)
          content = re.sub(r'(id="input-company")', r'\1 name="company"', content)
          content = re.sub(r'(id="input-role")', r'\1 name="role"', content)
          content = re.sub(r'(id="input-email")', r'\1 name="email"', content)
          # 5. Remove any previously injected Formspree scripts to avoid duplicates
          content = re.sub(r'<script>\s*\(function\(\)\{[\s\S]*?\}\)\(\);\s*</script>', '', content, flags=re.DOTALL)
          # 6. Inject the CORRECT Formspree submit handler before </body>
          lines = [
            '<script>',
            '(function(){',
            '  function attachFormspree(){',
            '    var form = document.querySelector("#contact-section form") || document.querySelector("form");',
            '    if (!form) return;',
            '    var newForm = form.cloneNode(true);',
            '    form.parentNode.replaceChild(newForm, form);',
            '    newForm.addEventListener("submit", function(e){',
            '      e.preventDefault();',
            '      e.stopImmediatePropagation();',
            '      var btn = newForm.querySelector("[type=submit]");',
            '      var nameVal = (newForm.querySelector("#input-name") || {}).value || "";',
            '      var company = (newForm.querySelector("#input-company") || {}).value || "";',
            '      var role = (newForm.querySelector("#input-role") || {}).value || "";',
            '      var email = (newForm.querySelector("#input-email") || {}).value || "";',
            '      if (!email || !nameVal) { alert("Please fill in your name and email."); return; }',
            '      if (btn) { btn.disabled = true; btn.textContent = "SENDING..."; }',
            '      fetch("https://formspree.io/f/mojznnby", {',
            '        method: "POST",',
            '        headers: { "Content-Type": "application/json", "Accept": "application/json" },',
            '        body: JSON.stringify({ name: nameVal, company: company, role: role, email: email })',
            '      })',
            '      .then(function(r){ return r.json(); })',
            '      .then(function(data){',
            '        if (data.ok || data.next) {',
            '          newForm.innerHTML = "<div style=\'border-left:3px solid #8C6A56;padding-left:1rem\'><p style=\'font-weight:700;color:#1B3022\'>Message sent.</p><p style=\'color:#1B3022;opacity:0.7\'>Thank you, " + nameVal + ". We will reach out to schedule a scoping session for " + (company || "you") + " shortly.</p></div>";',
            '        } else {',
            '          if (btn) { btn.disabled = false; btn.textContent = "SEND IT \u2192"; }',
            '          alert("Something went wrong. Please try again.");',
            '        }',
            '      })',
            '      .catch(function(){',
            '        if (btn) { btn.disabled = false; btn.textContent = "SEND IT \u2192"; }',
            '        alert("Network error. Please try again.");',
            '      });',
            '    }, true);',
            '  }',
            '  if (document.readyState === "loading") {',
            '    document.addEventListener("DOMContentLoaded", attachFormspree);',
            '  } else { attachFormspree(); }',
            '})();',
            '</script>'
          ]
          fs_script = '\n'.join(lines)
          content = content.replace('</body>', fs_script + '\n</body>', 1)
          with open('insetcarbon-preview_github.html', 'w', encoding='utf-8') as f:
            f.write(content)
          print('Done. Formspree form-clone submit handler injected.')
          PYEOF
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add insetcarbon-preview_github.html
          git diff --cached --quiet || git commit -m "Fix: Formspree form-clone submit override - no triple quotes"
          git push
